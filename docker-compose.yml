services:
  # 1. The Frontend Service (Nginx + HTML)
  # This is what the user accesses in their browser.
  frontend:
    # Tells Docker to build the image using the 'Dockerfile'
    # located inside the './frontend' directory.
    build: ./frontend
    container_name: dashboard_frontend
    ports:
      # Exposes port 4446 on your server and maps it to port 80
      # inside this container (which is Nginx's default).
      - "4446:80"
    restart: unless-stopped
    # This ensures the frontend doesn't start until the backend
    # service is up and running.
    depends_on:
      - backend

  # 2. The Backend Service (Node.js API)
  # This handles login, users, and the database.
  backend:
    # Tells Docker to build the image using the 'Dockerfile'
    # located inside the './backend' directory.
    build: ./backend
    container_name: dashboard_backend
    restart: unless-stopped
    volumes:
      # This is critical. It maps the './data' folder on your server
      # (the host) to the '/app/data' folder inside the container.
      # This is where our SQLite database file will live, ensuring
      # it persists even if the container is rebuilt or restarted.
      - ./data:/app/data
    environment:
      # We'll use this later in the backend code for signing security tokens.
      # You can change "YOUR_SUPER_SECRET_KEY" to any random string.
      JWT_SECRET: "YOUR_SUPER_SECRET_KEYRGRGGDG"
      
    # Note: We don't expose any ports for the backend *to the host*
    # (like 51.79.55.125). The 'frontend' service will talk to the
    # 'backend' service directly inside Docker's private network.

